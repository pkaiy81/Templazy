name: Build Templazy

# 手動実行（Actionsタブの Run workflow）または v* タグ push でビルド
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon ランナー上で universal バイナリ（Intel + Apple Silicon 両対応）を作る。
          # → Intel専用ランナー(macos-13)に依存しない。1つの .app/.dmg がどのMacでも動く。
          - os: macos-14
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            bundles: dmg
            name: macos-universal
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            bundles: "msi,nsis"
            name: windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            bundles: deb
            name: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # 社内テンプレ(seed)は CI に載せない。常に空でビルドし、テンプレはアプリの
      # 「JSONインポート」で各自取り込む運用にする。
      - name: Use empty seed
        shell: bash
        run: echo "[]" > src-tauri/seed_templates.json

      - name: Build
        working-directory: src-tauri
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: templazy-${{ matrix.name }}
          # bundle/** = インストーラ（msi/nsis/dmg/deb）
          # 末尾2行 = ポータブル単体実行ファイル（Windows: templazy.exe / その他は無視される）
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
            src-tauri/target/${{ matrix.target }}/release/templazy.exe
          if-no-files-found: error

  # タグ push のときだけ：全OSの成果物を GitHub Release に添付する。
  # → Release のダウンロードは（public リポジトリなら）ログイン不要で誰でも可能。
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Release 作成に必要
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # ディレクトリ(.app等)は除き、配布する「ファイル」だけ添付する
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*-setup.exe
            artifacts/**/*.deb
            artifacts/**/templazy.exe
          draft: false
          generate_release_notes: true
